<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VDC Weekly Project Health</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --surface: #ffffff06;
      --surface-hover: #ffffff0e;
      --border: #ffffff0a;
      --text-primary: #f1f5f9;
      --text-secondary: #64748b;
      --text-muted: #334155;
      --red: #ef4444;
      --red-bg: rgba(239,68,68,0.12);
      --red-border: rgba(239,68,68,0.3);
      --orange: #f97316;
      --orange-bg: rgba(249,115,22,0.12);
      --orange-border: rgba(249,115,22,0.3);
      --green: #22c55e;
      --green-bg: rgba(34,197,94,0.12);
      --green-border: rgba(34,197,94,0.3);
    }

    body {
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 32px 24px;
    }

    .container { max-width: 960px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
    }
    .header-eyebrow {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .header-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }
    .header-date { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .header-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    /* Stat Cards */
    .stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    .stat-card:hover { background: var(--surface-hover); }
    .stat-card.active-red    { background: var(--red-bg);    border-color: var(--red-border); }
    .stat-card.active-orange { background: var(--orange-bg); border-color: var(--orange-border); }
    .stat-card.active-green  { background: var(--green-bg);  border-color: var(--green-border); }
    .stat-number { font-size: 36px; font-weight: 800; line-height: 1; }
    .stat-label  { font-size: 12px; color: var(--text-secondary); margin-top: 4px; display: flex; align-items: center; gap: 6px; }

    /* Legend */
    .legend {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
      font-size: 11px;
      color: var(--text-secondary);
      align-items: center;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-right { margin-left: auto; }

    /* Column Headers */
    .col-headers {
      display: grid;
      grid-template-columns: 1fr 130px 52px 52px 130px;
      gap: 12px;
      padding: 0 16px 8px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .col-center { text-align: center; }

    /* Project Cards */
    .project-list { display: flex; flex-direction: column; gap: 6px; }
    .project-card {
      display: grid;
      grid-template-columns: 1fr 130px 52px 52px 130px;
      gap: 12px;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px 16px;
      border-left-width: 3px;
      animation: fadeIn 0.3s ease forwards;
      opacity: 0;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    .project-name { font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.3; }
    .project-number { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
    .manager { font-size: 11px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dot-cell { display: flex; justify-content: center; align-items: center; }

    .dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-red    { background: var(--red);    box-shadow: 0 0 6px var(--red); }
    .dot-orange { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
    .dot-green  { background: var(--green);  box-shadow: 0 0 6px var(--green); }

    /* Score Bar */
    .score-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .score-bar-track { flex: 1; height: 4px; background: #ffffff18; border-radius: 2px; overflow: hidden; }
    .score-bar-fill  { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
    .score-value { font-size: 12px; color: var(--text-secondary); font-variant-numeric: tabular-nums; min-width: 32px; }

    /* Loading / Error */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid #ffffff15;
      border-top-color: #64748b;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
    }

    .no-data { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 13px; }

    /* Region Filter */
    .region-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .region-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-right: 4px; }
    .region-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .region-btn:hover { background: var(--surface-hover); color: var(--text-primary); }
    .region-btn.active { background: #ffffff15; border-color: #ffffff30; color: var(--text-primary); }

    /* Region Group Header */
    .region-header {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 18px 4px 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .region-header:first-child { padding-top: 4px; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <div class="header-eyebrow">VDC Operations</div>
      <div class="header-title">Weekly Project Health</div>
      <div class="header-date" id="weekLabel">Loading...</div>
    </div>
    <div class="header-badge" id="totalBadge">— Active Projects</div>
  </div>

  <div class="stat-row" style="grid-template-columns: 1fr 1fr;">
    <button class="stat-card" id="card-red" onclick="toggleFilter('red')">
      <div class="stat-number" style="color:var(--red)" id="count-red">—</div>
      <div class="stat-label"><span class="dot dot-red" style="width:8px;height:8px;"></span> Critical</div>
    </button>
    <button class="stat-card" id="card-orange" onclick="toggleFilter('orange')">
      <div class="stat-number" style="color:var(--orange)" id="count-orange">—</div>
      <div class="stat-label"><span class="dot dot-orange" style="width:8px;height:8px;"></span> At Risk</div>
    </button>
  </div>

  <div class="region-bar" id="regionBar">
    <span class="region-label">Region</span>
    <button class="region-btn active" onclick="setRegion(null)" id="region-all">All</button>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="dot dot-red" style="width:8px;height:8px;"></span> Critical</div>
    <div class="legend-item"><span class="dot dot-orange" style="width:8px;height:8px;"></span> At Risk</div>
    <div class="legend-item"><span class="dot dot-green" style="width:8px;height:8px;"></span> On Track</div>
    <div class="legend-right">SCH = Schedule Risk &nbsp;|&nbsp; PER = Perception</div>
  </div>

  <div class="col-headers">
    <span>Project</span>
    <span>Lead VDC Manager</span>
    <span class="col-center">SCH</span>
    <span class="col-center">PER</span>
    <span>Mtg Score (14d avg)</span>
  </div>

  <div class="project-list" id="projectList">
    <div class="state-msg"><div class="spinner"></div>Loading project data...</div>
  </div>

  <div class="footer" id="footer"></div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────
  const QB_REALM    = "brasfieldgorrie.quickbase.com";
  const QB_TOKEN    = "b4czgp_mqqz_0_bj2jjmi7hfnx7dfdm94ddqw675q";
  const TABLE_ID    = "bswhe9t89";

  const FIELDS = {
    projectName:     8,
    projectNumber:   7,
    leadVDCManager:  77,
    scheduleText:    240,
    perceptionText:  241,
    avgMeetingScore: 237,
    region:          210,
    ratingCount:     238,
  };
  // ────────────────────────────────────────────────────────────────────────

  const SEVERITY = { "RED-RED":0,"RED-YELLOW":1,"YELLOW-RED":2,"YELLOW-YELLOW":3,"RED-GREEN":4,"GREEN-RED":5,"YELLOW-GREEN":6,"GREEN-YELLOW":7,"GREEN-GREEN":8 };
  const statusOf = v => (v||"").toUpperCase().trim();
  const dotClass = s => s === "RED" ? "dot-red" : s === "YELLOW" ? "dot-orange" : "dot-green";
  const barColor = n => n < 2.75 ? "var(--red)" : n < 3.5 ? "var(--orange)" : "var(--green)";
  const borderColor = s => s === "RED" ? "var(--red)" : s === "YELLOW" ? "var(--orange)" : "var(--green)";

  let allProjects = [];
  let activeFilter = null;
  let activeRegion = null;

  function toggleFilter(color) {
    activeFilter = activeFilter === color ? null : color;
    ["red","orange"].forEach(c => {
      const el = document.getElementById(`card-${c}`);
      el.className = "stat-card" + (activeFilter === c ? ` active-${c}` : "");
    });
    renderList();
  }

  function setRegion(region) {
    activeRegion = region;
    document.querySelectorAll(".region-btn").forEach(b => b.classList.remove("active"));
    const id = region ? `region-${region.replace(/\s+/g,"-")}` : "region-all";
    const el = document.getElementById(id);
    if (el) el.classList.add("active");
    renderList();
  }

  function buildRegionButtons(projects) {
    const regions = [...new Set(projects.map(p => p.region).filter(Boolean))].sort();
    const bar = document.getElementById("regionBar");
    // Remove old region buttons except "All"
    bar.querySelectorAll(".region-btn:not(#region-all)").forEach(b => b.remove());
    regions.forEach(r => {
      const btn = document.createElement("button");
      btn.className = "region-btn";
      btn.id = `region-${r.replace(/\s+/g,"-")}`;
      btn.textContent = r;
      btn.onclick = () => setRegion(r);
      bar.appendChild(btn);
    });
  }

  function getWorstStatus(sch, per) {
    const order = ["RED","YELLOW","GREEN"];
    const si = order.indexOf(sch), pi = order.indexOf(per);
    return order[Math.min(si < 0 ? 2 : si, pi < 0 ? 2 : pi)];
  }

  function renderList() {
    const list = document.getElementById("projectList");

    let data = [...allProjects].sort((a,b) => {
      // Sort by region first, then severity
      if (a.region < b.region) return -1;
      if (a.region > b.region) return 1;
      const ka = `${a.sch}-${a.per}`, kb = `${b.sch}-${b.per}`;
      return (SEVERITY[ka]??9) - (SEVERITY[kb]??9);
    });

    // Apply region filter
    if (activeRegion) {
      data = data.filter(p => p.region === activeRegion);
    }

    // Apply status filter
    if (activeFilter === "red") {
      data = data.filter(p => p.sch === "RED" || p.per === "RED");
    } else if (activeFilter === "orange") {
      data = data.filter(p => (p.sch === "YELLOW" || p.per === "YELLOW") && p.sch !== "RED" && p.per !== "RED");
    } else if (activeFilter === "green") {
      data = data.filter(p => p.sch === "GREEN" && p.per === "GREEN");
    }

    if (data.length === 0) {
      list.innerHTML = '<div class="no-data">No projects match this filter.</div>';
      return;
    }

    // Group by region
    const groups = {};
    data.forEach(p => {
      const key = p.region || "No Region";
      if (!groups[key]) groups[key] = [];
      groups[key].push(p);
    });

    let html = "";
    let cardIndex = 0;

    Object.keys(groups).sort().forEach(region => {
      // Only show region headers if not filtered to a single region
      if (!activeRegion) {
        html += `<div class="region-header">${region} <span style="color:var(--text-muted);font-weight:400">(${groups[region].length})</span></div>`;
      }

      groups[region].forEach(p => {
        const worst = getWorstStatus(p.sch, p.per);
        const bColor = borderColor(worst);
        const score = p.score;
        const scorePct = score != null ? ((score / 5) * 100).toFixed(1) : null;
        const delayMs = cardIndex * 40;
        cardIndex++;

        html += `
          <div class="project-card" style="border-left-color:${bColor}; animation-delay:${delayMs}ms;">
            <div>
              <div class="project-name">${p.name}</div>
              <div class="project-number">#${p.number}</div>
            </div>
            <div class="manager">${p.manager || "—"}</div>
            <div class="dot-cell"><span class="dot ${dotClass(p.sch)}"></span></div>
            <div class="dot-cell"><span class="dot ${dotClass(p.per)}"></span></div>
            <div class="score-bar-wrap">
              ${scorePct != null ? `
                <div class="score-bar-track">
                  <div class="score-bar-fill" style="width:${scorePct}%;background:${barColor(score)}"></div>
                </div>
                <span class="score-value">${score.toFixed(2)}</span>
              ` : '<span class="score-value" style="color:var(--text-muted)">—</span>'}
            </div>
          </div>`;
      });
    });

    list.innerHTML = html;
  }

  async function loadData() {
    try {
      const res = await fetch("https://api.quickbase.com/v1/records/query", {
        method: "POST",
        headers: {
          "QB-Realm-Hostname": QB_REALM,
          "Authorization": `QB-USER-TOKEN ${QB_TOKEN}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          from: TABLE_ID,
          select: Object.values(FIELDS),
          where: `{${FIELDS.scheduleText}.EX.'RED'}OR{${FIELDS.scheduleText}.EX.'YELLOW'}OR{${FIELDS.perceptionText}.EX.'RED'}OR{${FIELDS.perceptionText}.EX.'YELLOW'}`,
          sortBy: [{ fieldId: FIELDS.projectName, order: "ASC" }],
          options: { top: 200 }
        })
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(`QB API error ${res.status}: ${err}`);
      }

      const json = await res.json();
      const records = json.data || [];

      allProjects = records
        .map(r => ({
          name:        r[FIELDS.projectName]?.value    || "Unknown",
          number:      r[FIELDS.projectNumber]?.value  || "",
          manager:     r[FIELDS.leadVDCManager]?.value?.name || r[FIELDS.leadVDCManager]?.value || "",
          sch:         statusOf(r[FIELDS.scheduleText]?.value),
          per:         statusOf(r[FIELDS.perceptionText]?.value),
          score:       r[FIELDS.avgMeetingScore]?.value != null ? parseFloat(r[FIELDS.avgMeetingScore].value) : null,
          region:      r[FIELDS.region]?.value || "",
          ratingCount: parseInt(r[FIELDS.ratingCount]?.value || 0),
        }))
        // Only include projects that have recent meeting rating data
        .filter(p => p.ratingCount > 0);

      // Stats
      const redCount    = allProjects.filter(p => p.sch === "RED"    || p.per === "RED").length;
      const orangeCount = allProjects.filter(p => (p.sch === "YELLOW" || p.per === "YELLOW") && p.sch !== "RED" && p.per !== "RED").length;

      document.getElementById("count-red").textContent    = redCount;
      document.getElementById("count-orange").textContent = orangeCount;
      document.getElementById("totalBadge").textContent   = `${allProjects.length} Flagged Projects`;

      // Week label
      const now = new Date();
      const opts = { month: "long", day: "numeric", year: "numeric" };
      document.getElementById("weekLabel").textContent = `Week of ${now.toLocaleDateString("en-US", opts)}`;

      // Footer
      document.getElementById("footer").textContent = `Data loaded from QuickBase · ${now.toLocaleTimeString()}`;

      buildRegionButtons(allProjects);
      renderList();

    } catch (e) {
      document.getElementById("projectList").innerHTML = `
        <div class="state-msg" style="color:var(--red)">
          ⚠ Failed to load data<br/>
          <span style="font-size:12px;color:var(--text-secondary);margin-top:8px;display:block">${e.message}</span>
          <span style="font-size:11px;color:var(--text-muted);margin-top:6px;display:block">Check that the Table ID and token are correct, and that CORS is enabled for API access.</span>
        </div>`;
      document.getElementById("weekLabel").textContent = "Error loading data";
    }
  }

  loadData();
</script>
</body>
</html>
