<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VDC Weekly Project Health</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:              #ffffff;
      --surface:         rgba(55, 53, 47, 0.04);
      --surface-hover:   rgba(55, 53, 47, 0.07);
      --border:          rgba(55, 53, 47, 0.09);
      --border-strong:   rgba(55, 53, 47, 0.16);
      --text-primary:    #37352f;
      --text-secondary:  #787774;
      --text-muted:      #b5b3ad;

      /* Notion named-color palette */
      --red:             rgb(212, 76, 71);
      --red-bg:          rgb(255, 226, 221);
      --red-border:      rgba(212, 76, 71, 0.28);

      --orange:          rgb(203, 145, 47);
      --orange-bg:       rgb(253, 236, 200);
      --orange-border:   rgba(203, 145, 47, 0.28);

      --green:           rgb(15, 123, 108);
      --green-bg:        rgb(219, 237, 219);
      --green-border:    rgba(15, 123, 108, 0.28);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
                   "Apple Color Emoji", Arial, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 40px 56px 56px;
      font-size: 14px;
      line-height: 1.5;
    }

    .container { max-width: 900px; margin: 0 auto; }

    /* ── Page Icon ── */
    .page-icon {
      font-size: 40px;
      margin-bottom: 8px;
      line-height: 1;
      user-select: none;
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 28px;
    }
    .header-eyebrow {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      letter-spacing: 0;
      text-transform: none;
    }
    .header-title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      line-height: 1.2;
    }
    .header-date {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 5px;
    }
    .header-badge {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      align-self: flex-start;
      margin-top: 6px;
    }

    /* Notion-style page divider */
    .page-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 24px;
    }

    /* ── Stat Cards ── */
    .stat-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-radius: 4px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.1s;
      text-align: left;
      font-family: inherit;
    }
    .stat-card:hover { background: var(--surface-hover); }

    /* Default left-border colors by id */
    #card-red    { border-left-color: var(--red); }
    #card-orange { border-left-color: var(--orange); }

    /* Active (clicked) states */
    .stat-card.active-red    { background: var(--red-bg);    border-color: var(--red-border);    border-left-color: var(--red); }
    .stat-card.active-orange { background: var(--orange-bg); border-color: var(--orange-border); border-left-color: var(--orange); }
    .stat-card.active-green  { background: var(--green-bg);  border-color: var(--green-border);  border-left-color: var(--green); }

    #card-red    .stat-number { color: var(--red); }
    #card-orange .stat-number { color: var(--orange); }

    .stat-number { font-size: 28px; font-weight: 600; line-height: 1; }
    .stat-label  {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Region Filter ── */
    .region-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      align-items: center;
    }
    .region-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-right: 4px;
      font-weight: 500;
    }
    .region-btn {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.1s;
      font-family: inherit;
    }
    .region-btn:hover { background: var(--surface-hover); color: var(--text-primary); }
    .region-btn.active {
      background: rgba(55, 53, 47, 0.08);
      color: var(--text-primary);
      border-color: rgba(55, 53, 47, 0.18);
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      gap: 14px;
      margin-bottom: 10px;
      font-size: 11px;
      color: var(--text-secondary);
      align-items: center;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-right { margin-left: auto; color: var(--text-muted); }

    /* ── Column Headers — Notion property header style ── */
    .col-headers {
      display: grid;
      grid-template-columns: 1fr 130px 68px 68px 140px;
      gap: 12px;
      padding: 0 8px 6px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }
    .col-center { text-align: center; }

    /* ── Project List ── */
    .project-list { display: flex; flex-direction: column; }

    /* Notion database row */
    .project-card {
      display: grid;
      grid-template-columns: 1fr 130px 68px 68px 140px;
      gap: 12px;
      align-items: center;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      border-left: 3px solid transparent;
      padding: 8px 8px 8px 6px;
      animation: fadeIn 0.2s ease forwards;
      opacity: 0;
      transition: background 0.08s;
    }
    .project-card:hover { background: var(--surface); }
    @keyframes fadeIn { to { opacity: 1; } }

    .project-name   { font-size: 13px; font-weight: 500; color: var(--text-primary); line-height: 1.3; }
    .project-number { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .manager        { font-size: 12px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dot-cell       { display: flex; justify-content: center; align-items: center; }

    /* Notion select tag — colored pill with symbol, colorblind-safe */
    .dot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      line-height: 1.4;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0;
    }
    .dot::before {
      font-size: 10px;
      line-height: 1;
    }
    .dot-red    { background: var(--red-bg);    color: var(--red);    }
    .dot-red::before    { content: "✕"; }
    .dot-orange { background: var(--orange-bg); color: var(--orange); }
    .dot-orange::before { content: "▲"; font-size: 8px; }
    .dot-green  { background: var(--green-bg);  color: var(--green);  }
    .dot-green::before  { content: "✓"; }

    /* ── Score Bar — Notion number-bar style ── */
    .score-bar-wrap  { display: flex; align-items: center; gap: 8px; }
    .score-bar-track {
      flex: 1;
      height: 3px;
      background: rgba(55, 53, 47, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .score-bar-fill  { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
    .score-value     {
      font-size: 12px;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
      min-width: 32px;
    }

    /* ── Region Group Header ── */
    .region-header {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0;
      text-transform: none;
      color: var(--text-secondary);
      padding: 18px 8px 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }
    .region-header:first-child { padding-top: 6px; }

    /* ── Loading / Error ── */
    .state-msg {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(55, 53, 47, 0.1);
      border-top-color: var(--text-secondary);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .no-data {
      text-align: center;
      padding: 36px;
      color: var(--text-secondary);
      font-size: 13px;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 20px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
<div class="container">

  <div class="page-icon">🏗️</div>

  <div class="header">
    <div>
      <div class="header-eyebrow">VDC Operations</div>
      <div class="header-title">Weekly Project Health</div>
      <div class="header-date" id="weekLabel">Loading...</div>
    </div>
    <div class="header-badge" id="totalBadge">— Active Projects</div>
  </div>

  <hr class="page-divider" />

  <div class="stat-row" style="grid-template-columns: 1fr 1fr;">
    <button class="stat-card" id="card-red" onclick="toggleFilter('red')">
      <div class="stat-number" id="count-red">—</div>
      <div class="stat-label"><span class="dot dot-red"></span> Critical</div>
    </button>
    <button class="stat-card" id="card-orange" onclick="toggleFilter('orange')">
      <div class="stat-number" id="count-orange">—</div>
      <div class="stat-label"><span class="dot dot-orange"></span> At Risk</div>
    </button>
  </div>

  <div class="region-bar" id="regionBar">
    <span class="region-label">Region</span>
    <button class="region-btn active" onclick="setRegion(null)" id="region-all">All</button>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="dot dot-red"></span> Critical</div>
    <div class="legend-item"><span class="dot dot-orange"></span> At Risk</div>
    <div class="legend-item"><span class="dot dot-green"></span> On Track</div>
    <div class="legend-right">SCH = Schedule Risk &nbsp;·&nbsp; PER = Perception</div>
  </div>

  <div class="col-headers">
    <span>Project</span>
    <span>Lead VDC Manager</span>
    <span class="col-center">SCH</span>
    <span class="col-center">PER</span>
    <span>Mtg Score (14d avg)</span>
  </div>

  <div class="project-list" id="projectList">
    <div class="state-msg"><div class="spinner"></div>Loading project data...</div>
  </div>

  <div class="footer" id="footer"></div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────
  const QB_REALM    = "brasfieldgorrie.quickbase.com";
  const QB_TOKEN    = "b4czgp_mqqz_0_bj2jjmi7hfnx7dfdm94ddqw675q";
  const TABLE_ID    = "bswhe9t89";

  const FIELDS = {
    projectName:     8,
    projectNumber:   7,
    leadVDCManager:  77,
    scheduleText:    240,
    perceptionText:  241,
    avgMeetingScore: 237,
    region:          210,
    ratingCount:     238,
  };
  // ────────────────────────────────────────────────────────────────────────

  const SEVERITY = { "RED-RED":0,"RED-YELLOW":1,"YELLOW-RED":2,"YELLOW-YELLOW":3,"RED-GREEN":4,"GREEN-RED":5,"YELLOW-GREEN":6,"GREEN-YELLOW":7,"GREEN-GREEN":8 };
  const statusOf = v => (v||"").toUpperCase().trim();
  const dotClass = s => s === "RED" ? "dot-red" : s === "YELLOW" ? "dot-orange" : "dot-green";
  const barColor = n => n < 2.75 ? "var(--red)" : n < 3.5 ? "var(--orange)" : "var(--green)";
  const borderColor = s => s === "RED" ? "var(--red)" : s === "YELLOW" ? "var(--orange)" : "var(--green)";

  let allProjects = [];
  let activeFilter = null;
  let activeRegion = null;

  function toggleFilter(color) {
    activeFilter = activeFilter === color ? null : color;
    ["red","orange"].forEach(c => {
      const el = document.getElementById(`card-${c}`);
      el.className = "stat-card" + (activeFilter === c ? ` active-${c}` : "");
    });
    renderList();
  }

  function setRegion(region) {
    activeRegion = region;
    document.querySelectorAll(".region-btn").forEach(b => b.classList.remove("active"));
    const id = region ? `region-${region.replace(/\s+/g,"-")}` : "region-all";
    const el = document.getElementById(id);
    if (el) el.classList.add("active");
    renderList();
  }

  function buildRegionButtons(projects) {
    const regions = [...new Set(projects.map(p => p.region).filter(Boolean))].sort();
    const bar = document.getElementById("regionBar");
    bar.querySelectorAll(".region-btn:not(#region-all)").forEach(b => b.remove());
    regions.forEach(r => {
      const btn = document.createElement("button");
      btn.className = "region-btn";
      btn.id = `region-${r.replace(/\s+/g,"-")}`;
      btn.textContent = r;
      btn.onclick = () => setRegion(r);
      bar.appendChild(btn);
    });
  }

  function getWorstStatus(sch, per) {
    const order = ["RED","YELLOW","GREEN"];
    const si = order.indexOf(sch), pi = order.indexOf(per);
    return order[Math.min(si < 0 ? 2 : si, pi < 0 ? 2 : pi)];
  }

  function renderList() {
    const list = document.getElementById("projectList");

    let data = [...allProjects].sort((a,b) => {
      if (a.region < b.region) return -1;
      if (a.region > b.region) return 1;
      const ka = `${a.sch}-${a.per}`, kb = `${b.sch}-${b.per}`;
      return (SEVERITY[ka]??9) - (SEVERITY[kb]??9);
    });

    if (activeRegion) data = data.filter(p => p.region === activeRegion);

    if (activeFilter === "red") {
      data = data.filter(p => p.sch === "RED" || p.per === "RED");
    } else if (activeFilter === "orange") {
      data = data.filter(p => (p.sch === "YELLOW" || p.per === "YELLOW") && p.sch !== "RED" && p.per !== "RED");
    } else if (activeFilter === "green") {
      data = data.filter(p => p.sch === "GREEN" && p.per === "GREEN");
    }

    if (data.length === 0) {
      list.innerHTML = '<div class="no-data">No projects match this filter.</div>';
      return;
    }

    const groups = {};
    data.forEach(p => {
      const key = p.region || "No Region";
      if (!groups[key]) groups[key] = [];
      groups[key].push(p);
    });

    let html = "";
    let cardIndex = 0;

    Object.keys(groups).sort().forEach(region => {
      if (!activeRegion) {
        html += `<div class="region-header">${region} <span style="color:var(--text-muted);font-weight:400;font-size:11px;">${groups[region].length} projects</span></div>`;
      }

      groups[region].forEach(p => {
        const worst = getWorstStatus(p.sch, p.per);
        const bColor = borderColor(worst);
        const score = p.score;
        const scorePct = score != null ? ((score / 5) * 100).toFixed(1) : null;
        const delayMs = cardIndex * 30;
        cardIndex++;

        html += `
          <div class="project-card" style="border-left-color:${bColor}; animation-delay:${delayMs}ms;">
            <div>
              <div class="project-name">${p.name}</div>
              <div class="project-number">#${p.number}</div>
            </div>
            <div class="manager">${p.manager || "—"}</div>
            <div class="dot-cell"><span class="dot ${dotClass(p.sch)}"></span></div>
            <div class="dot-cell"><span class="dot ${dotClass(p.per)}"></span></div>
            <div class="score-bar-wrap">
              ${scorePct != null ? `
                <div class="score-bar-track">
                  <div class="score-bar-fill" style="width:${scorePct}%;background:${barColor(score)}"></div>
                </div>
                <span class="score-value">${score.toFixed(2)}</span>
              ` : '<span class="score-value" style="color:var(--text-muted)">—</span>'}
            </div>
          </div>`;
      });
    });

    list.innerHTML = html;
  }

  async function loadData() {
    try {
      const res = await fetch("https://api.quickbase.com/v1/records/query", {
        method: "POST",
        headers: {
          "QB-Realm-Hostname": QB_REALM,
          "Authorization": `QB-USER-TOKEN ${QB_TOKEN}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          from: TABLE_ID,
          select: Object.values(FIELDS),
          where: `{${FIELDS.scheduleText}.EX.'RED'}OR{${FIELDS.scheduleText}.EX.'YELLOW'}OR{${FIELDS.perceptionText}.EX.'RED'}OR{${FIELDS.perceptionText}.EX.'YELLOW'}`,
          sortBy: [{ fieldId: FIELDS.projectName, order: "ASC" }],
          options: { top: 200 }
        })
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(`QB API error ${res.status}: ${err}`);
      }

      const json = await res.json();
      const records = json.data || [];

      allProjects = records
        .map(r => ({
          name:        r[FIELDS.projectName]?.value    || "Unknown",
          number:      r[FIELDS.projectNumber]?.value  || "",
          manager:     r[FIELDS.leadVDCManager]?.value?.name || r[FIELDS.leadVDCManager]?.value || "",
          sch:         statusOf(r[FIELDS.scheduleText]?.value),
          per:         statusOf(r[FIELDS.perceptionText]?.value),
          score:       r[FIELDS.avgMeetingScore]?.value != null ? parseFloat(r[FIELDS.avgMeetingScore].value) : null,
          region:      r[FIELDS.region]?.value || "",
          ratingCount: parseInt(r[FIELDS.ratingCount]?.value || 0),
        }))
        .filter(p => p.ratingCount > 0);

      const redCount    = allProjects.filter(p => p.sch === "RED"    || p.per === "RED").length;
      const orangeCount = allProjects.filter(p => (p.sch === "YELLOW" || p.per === "YELLOW") && p.sch !== "RED" && p.per !== "RED").length;

      document.getElementById("count-red").textContent    = redCount;
      document.getElementById("count-orange").textContent = orangeCount;
      document.getElementById("totalBadge").textContent   = `${allProjects.length} Flagged Projects`;

      const now = new Date();
      const opts = { month: "long", day: "numeric", year: "numeric" };
      document.getElementById("weekLabel").textContent = `Week of ${now.toLocaleDateString("en-US", opts)}`;
      document.getElementById("footer").textContent = `Data from QuickBase · Refreshed ${now.toLocaleTimeString()}`;

      buildRegionButtons(allProjects);
      renderList();

    } catch (e) {
      document.getElementById("projectList").innerHTML = `
        <div class="state-msg" style="color:var(--red)">
          ⚠ Failed to load data<br/>
          <span style="font-size:12px;color:var(--text-secondary);margin-top:8px;display:block">${e.message}</span>
          <span style="font-size:11px;color:var(--text-muted);margin-top:6px;display:block">Check that the Table ID and token are correct, and that CORS is enabled for API access.</span>
        </div>`;
      document.getElementById("weekLabel").textContent = "Error loading data";
    }
  }

  loadData();
</script>
</body>
</html>
